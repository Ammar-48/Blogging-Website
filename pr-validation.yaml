name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Lint HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Run HTMLHint
        run: htmlhint "src/**/*.html"

      - name: Run Stylelint
        run: stylelint "styles/**/*.css"

  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --save-dev parcel

      - name: Build Project
        run: npx parcel build src/index.html
